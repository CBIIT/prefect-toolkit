# Welcome to your prefect.yaml file! You can use this file for storing and managing
# configuration for deploying your flows. We recommend committing this file to source
# control along with your flow code.

# Generic metadata about this project
name: s3-Prefect-Workflow
prefect-version: 2.13.0

# build section allows you to manage and build docker images
build: null

# push section allows you to manage if and how this project is uploaded to remote locations
push: null

# pull section allows you to provide instructions for cloning this project in remote locations

pull:
  - prefect.projects.steps.git_clone:
      id: clone-step
      repository: https://github.com/CBIIT/prefect-toolkit.git
      branch: CRDCDH-1415-dbgap_validation
      include_submodules: True
  - prefect.projects.steps.pip_install_requirements:
      requirements_file: requirements.txt
      directory: "{{ clone-step.directory }}"
      stream_output: True

# the deployments section allows you to provide configuration for deploying flows
deployments:
  - name: dbgap_validation
    version: null
    tags: ["TEST"]
    description: null
    entrypoint: workflow/crdcdh/dbgap_validation.py:validation_against_dbgap
    schedule: null

    # flow-specific parameters
    parameters:

    # infra-specific fields
    work_pool:
      name: crdc-dh-dev-validation-ecs
      work_queue_name: null
      job_variables: {}

  - name: multimodel-validator-python3.13
    version: null
    tags: ["Production","Multimodel"]
    description: null
    entrypoint: workflow/validate_submission.py:validate_submission_tsv
    schedule: null

    parameters:
      val_output_bucket: "ccdi-validation"

    pull:
      - prefect.deployments.steps.git_clone:
          id: clone-step
          repository: https://github.com/CBIIT/prefect-toolkit.git
          branch: main
      - prefect.deployments.steps.pip_install_requirements:
          requirements_file: requirements_prefect3.4.19_python3.13.7.txt
          directory: "{{ clone-step.directory }}"
          stream_output: False

    # infra-specific fields
    work_pool:
      name: ccdi-curation-16gb-future-prefect-3.4.19-python3.13
      work_queue_name: null
      job_variables: {}